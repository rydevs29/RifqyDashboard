<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RifqyDashboard | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #050510;
      --card-bg: rgba(20, 20, 35, 0.4);
      --card-border: rgba(255, 255, 255, 0.1);
      --primary-glow: #00d2ff;
      --secondary-glow: #7a2aff;
      --text-main: #ffffff;
      --text-muted: #94a3b8;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* BACKGROUND EFFECT */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: 
        radial-gradient(circle at 15% 50%, rgba(122, 42, 255, 0.15), transparent 30%),
        radial-gradient(circle at 85% 30%, rgba(0, 210, 255, 0.15), transparent 30%);
      z-index: -2;
      animation: pulseGlow 12s ease-in-out infinite alternate;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -1;
      pointer-events: none;
      mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
    }

    @keyframes pulseGlow {
      0% { transform: scale(1); opacity: 0.7; }
      100% { transform: scale(1.1); opacity: 1; }
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 5%;
      border-bottom: 1px solid var(--card-border);
      background: rgba(5, 5, 16, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      flex-wrap: wrap;
      gap: 15px;
    }

    h1 {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      margin: 0;
      font-weight: 700;
      background: linear-gradient(90deg, #fff, #00d2ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* HEADER CONTROLS (SEARCH + LANG) */
    .header-controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* SEARCH INPUT */
    .search-input {
      background: rgba(20, 20, 35, 0.8);
      color: #fff;
      border: 1px solid var(--card-border);
      padding: 10px 16px;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      width: 250px;
    }

    .search-input:focus {
      border-color: var(--primary-glow);
      box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    /* LANGUAGE SELECTOR */
    .lang-selector {
      background: rgba(20, 20, 35, 0.8);
      color: #fff;
      border: 1px solid var(--card-border);
      padding: 10px 16px;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      outline: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 12px top 50%;
      background-size: 10px auto;
      padding-right: 35px;
    }

    .lang-selector:hover, .lang-selector:focus {
      border-color: var(--primary-glow);
      box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
    }

    .lang-selector option {
      background: #050510;
      color: #fff;
    }

    /* GRID LAYOUT */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      padding: 40px 5%;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* PREMIUM CARD STYLE */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: rgba(0, 210, 255, 0.4);
      box-shadow: 
        0 20px 40px -5px rgba(0, 0, 0, 0.5),
        0 0 20px rgba(0, 210, 255, 0.15); 
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 3px;
      background: linear-gradient(90deg, transparent, var(--primary-glow), var(--secondary-glow), transparent);
      opacity: 0;
      transition: 0.5s;
      transform: translateX(-100%);
    }

    .card:hover::before {
      opacity: 1;
      transform: translateX(0);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1.25rem;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 10px;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      margin-bottom: 12px;
      width: fit-content;
      color: var(--primary-glow);
    }

    .card p {
      margin: 0 0 24px;
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.6;
      flex-grow: 1;
    }

    /* BUTTON STYLE */
    .link-btn {
      display: block;
      width: 100%;
      padding: 12px 0;
      background: rgba(0, 210, 255, 0.05);
      color: var(--primary-glow);
      border: 1px solid rgba(0, 210, 255, 0.3);
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      text-align: center;
      transition: all 0.3s ease;
      box-sizing: border-box;
      margin-top: auto;
    }

    .link-btn:hover {
      background: var(--primary-glow);
      color: #050510;
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
    }

    /* SKELETON LOADING ANIMATION */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
      background-size: 200% 100%;
      animation: skeletonLoading 1.5s infinite;
      border-radius: 4px;
    }
    .skeleton-title { height: 24px; width: 60%; margin-bottom: 12px; }
    .skeleton-badge { height: 20px; width: 30%; margin-bottom: 16px; border-radius: 20px;}
    .skeleton-text { height: 14px; margin-bottom: 8px; width: 100%; }
    .skeleton-text:nth-child(4) { width: 80%; }
    .skeleton-btn { height: 44px; width: 100%; border-radius: 8px; margin-top: 24px;}

    @keyframes skeletonLoading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Error / Empty State */
    .status-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    @media (max-width: 600px) {
      .grid { padding: 20px; gap: 16px; }
      header { flex-direction: column; align-items: flex-start; }
      .header-controls { width: 100%; }
      .search-input { width: 100%; }
      .lang-selector { flex-grow: 1; }
    }
  </style>
</head>
<body>
  <header>
    <h1 id="title">RifqyDashboard</h1>
    <div class="header-controls">
      <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search repository..." autocomplete="off" />
      <select id="langSelector" class="lang-selector">
        <option value="en" selected>🇬🇧 English (Default)</option>
        <option value="id">🇮🇩 Indonesia</option>
        <option value="es">🇪🇸 Español</option>
        <option value="ja">🇯🇵 日本語 (Japanese)</option>
        <option value="ar">🇸🇦 العربية (Arabic)</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="ko">🇰🇷 한국어 (Korean)</option>
      </select>
    </div>
  </header>

  <div class="grid" id="dashboard-grid">
    </div>

  <script>
  // ==========================================
  // KONFIGURASI UTAMA
  // ==========================================
  const GITHUB_USERNAME = "rifqydev";
  
  // ==========================================

  const gridContainer = document.getElementById("dashboard-grid");
  const langSelector = document.getElementById("langSelector");
  const searchInput = document.getElementById("searchInput");

  let repositories = []; 
  let translationCache = {}; 
  let currentSearchQuery = "";

  // 1. Tampilkan Efek Loading (Skeleton)
  function showSkeletons() {
    gridContainer.innerHTML = Array(8).fill(`
      <div class="card">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-badge"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-btn"></div>
      </div>
    `).join("");
  }

  // 2. Ambil SEMUA Repository dari GitHub
  async function fetchAllGitHubRepos() {
    try {
      const response = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?per_page=100&sort=updated`);
      
      if (!response.ok) throw new Error("Gagal mengambil data dari GitHub API");
      
      const data = await response.json();
      
      // Sembunyikan repository hasil fork
      repositories = data.filter(repo => !repo.fork);

      if (repositories.length === 0) {
        gridContainer.innerHTML = `<div class="status-msg">Belum ada repository publik yang ditemukan untuk @${GITHUB_USERNAME}.</div>`;
        return;
      }

      await renderDashboard();

    } catch (error) {
      console.error("Error:", error);
      gridContainer.innerHTML = `<div class="status-msg" style="color: #ff4a4a;">Terjadi kesalahan saat memuat data GitHub. Pastikan username benar atau coba lagi nanti.</div>`;
    }
  }

  // 3. Fungsi Translate via Google Translate API
  async function translateText(text, targetLang) {
    if (!text) return "";
    if (targetLang === 'en') return text; 

    if (translationCache[text] && translationCache[text][targetLang]) {
      return translationCache[text][targetLang];
    }

    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
      const response = await fetch(url);
      const data = await response.json();
      const translated = data[0].map(item => item[0]).join("");
      
      if (!translationCache[text]) translationCache[text] = {};
      translationCache[text][targetLang] = translated;

      return translated;
    } catch (error) {
      console.error("Translation Error:", error);
      return text; 
    }
  }

  // 4. Render Kartu ke Layar dengan Sistem Filter
  async function renderDashboard() {
    const selectedLang = langSelector.value;
    
    // Setup teks berdasarkan bahasa
    let btnText = "Open Repository";
    if (selectedLang === "id") { btnText = "Buka Repository"; searchInput.placeholder = "🔍 Cari repository..."; }
    else if (selectedLang === "es") { btnText = "Abrir Repositorio"; searchInput.placeholder = "🔍 Buscar repositorio..."; }
    else if (selectedLang === "ja") { btnText = "リポジトリを開く"; searchInput.placeholder = "🔍 リポジトリを検索..."; }
    else if (selectedLang === "ar") { btnText = "افتح المستودع"; searchInput.placeholder = "🔍 البحث في المستودع..."; }
    else if (selectedLang === "fr") { btnText = "Ouvrir le Dépôt"; searchInput.placeholder = "🔍 Rechercher un dépôt..."; }
    else if (selectedLang === "ko") { btnText = "저장소 열기"; searchInput.placeholder = "🔍 저장소 검색..."; }
    else { searchInput.placeholder = "🔍 Search repository..."; }

    // Proses Filtering
    const filteredRepos = repositories.filter(repo => {
      const repoName = repo.name.toLowerCase();
      const repoDesc = (repo.description || "").toLowerCase();
      return repoName.includes(currentSearchQuery) || repoDesc.includes(currentSearchQuery);
    });

    gridContainer.innerHTML = ""; // Bersihkan grid

    // Jika hasil pencarian kosong
    if (filteredRepos.length === 0) {
      gridContainer.innerHTML = `<div class="status-msg">Tidak ada repository yang cocok dengan "<b>${currentSearchQuery}</b>".</div>`;
      return;
    }

    // Loop repo yang sudah di-filter
    for (const repo of filteredRepos) {
      let rawDesc = repo.description || "No description provided.";
      let displayDesc = rawDesc;

      // Translate jika bukan EN
      if (selectedLang !== "en") {
        displayDesc = await translateText(rawDesc, selectedLang);
      }

      const langBadge = repo.language ? `<span class="badge">${repo.language}</span>` : `<span class="badge">Docs / Markdown</span>`;

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h2>📂 ${repo.name}</h2>
        ${langBadge}
        <p>${displayDesc}</p>
        <a href="${repo.html_url}" target="_blank" class="link-btn">${btnText}</a>
      `;

      gridContainer.appendChild(card);
    }
  }

  // 5. Event Listeners
  langSelector.addEventListener("change", async () => {
    if (repositories.length > 0) {
       gridContainer.innerHTML = `<div class="status-msg">Menerjemahkan / Translating... 🌍</div>`;
       await renderDashboard();
    }
  });

  searchInput.addEventListener("input", (e) => {
    currentSearchQuery = e.target.value.toLowerCase();
    
    // Agar tidak memanggil API terus menerus saat mengetik cepat (debouncing ringan)
    // Untuk performa, kita render ulang langsung karena data sudah ada di variabel 'repositories'
    if(repositories.length > 0) {
       renderDashboard(); 
    }
  });

  // Eksekusi Awal
  showSkeletons();
  fetchAllGitHubRepos();

  </script>
</body>
</html>
